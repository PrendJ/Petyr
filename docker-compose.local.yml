services:
  postgres:
    image: postgres:16
    container_name: unguess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unguess_redash
      POSTGRES_USER: unguess
      POSTGRES_PASSWORD: unguess_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unguess -d unguess_redash"]
      interval: 5s
      timeout: 5s
      retries: 20

  redash-ingestor:
    build:
      context: ./apps/redash-ingestor
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_REDASH_INGESTOR_BASE_PATH: ${REDASH_INGESTOR_BASE_PATH:-/redash-ingestor}
    container_name: unguess-redash-ingestor
    restart: unless-stopped
    command: npm run start
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://unguess:unguess_password@postgres:5432/unguess_redash?schema=public
      TZ: ${TZ:-Europe/Rome}
      SYNC_DAILY_TIME: ${SYNC_DAILY_TIME:-01:30}
      SYNC_LOCK_TTL_SECONDS: ${SYNC_LOCK_TTL_SECONDS:-3600}
      NEXT_PUBLIC_REDASH_INGESTOR_BASE_PATH: ${REDASH_INGESTOR_BASE_PATH:-/redash-ingestor}
      REDASH_INGESTOR_AUTH_MODE: ${REDASH_INGESTOR_AUTH_MODE:-access-layer}
      ACCESS_LAYER_PUBLIC_BASE_URL: ${REDASH_INGESTOR_ACCESS_LAYER_PUBLIC_BASE_URL:-https://access-layer.draftapps.it}
      ACCESS_LAYER_INTERNAL_BASE_URL: ${REDASH_INGESTOR_ACCESS_LAYER_INTERNAL_BASE_URL:-https://access-layer.draftapps.it}
      ACCESS_LAYER_CALLBACK_URL: ${REDASH_INGESTOR_ACCESS_LAYER_CALLBACK_URL:-https://petyr.draftapps.it/redash-ingestor/auth/callback}
      ACCESS_LAYER_TOOL_SLUG: ${REDASH_INGESTOR_ACCESS_LAYER_TOOL_SLUG:-redash-ingestor}
      ACCESS_LAYER_CLIENT_ID: ${REDASH_INGESTOR_ACCESS_LAYER_CLIENT_ID:-}
      ACCESS_LAYER_CLIENT_SECRET: ${REDASH_INGESTOR_ACCESS_LAYER_CLIENT_SECRET:-}
      REDASH_INGESTOR_SESSION_SECRET: ${REDASH_INGESTOR_SESSION_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  redash-worker:
    build:
      context: ./apps/redash-ingestor
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_REDASH_INGESTOR_BASE_PATH: ${REDASH_INGESTOR_BASE_PATH:-/redash-ingestor}
    container_name: unguess-redash-worker
    restart: unless-stopped
    command: npm run worker:loop
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://unguess:unguess_password@postgres:5432/unguess_redash?schema=public
      TZ: ${TZ:-Europe/Rome}
      SYNC_DAILY_TIME: ${SYNC_DAILY_TIME:-01:30}
      SYNC_LOCK_TTL_SECONDS: ${SYNC_LOCK_TTL_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy

  forecasting-app:
    build:
      context: ./apps/forecasting-app
      dockerfile: Dockerfile
    container_name: unguess-forecasting-app
    command: npm run start
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://unguess:unguess_password@postgres:5432/unguess_redash?schema=public
      PETYR_AUTH_MODE: ${PETYR_AUTH_MODE:-access-layer}
      ACCESS_LAYER_PUBLIC_BASE_URL: ${PETYR_ACCESS_LAYER_PUBLIC_BASE_URL:-https://access-layer.draftapps.it}
      ACCESS_LAYER_INTERNAL_BASE_URL: ${PETYR_ACCESS_LAYER_INTERNAL_BASE_URL:-https://access-layer.draftapps.it}
      ACCESS_LAYER_CALLBACK_URL: ${PETYR_ACCESS_LAYER_CALLBACK_URL:-https://petyr.draftapps.it/auth/callback}
      ACCESS_LAYER_TOOL_SLUG: ${PETYR_ACCESS_LAYER_TOOL_SLUG:-petyr}
      ACCESS_LAYER_CLIENT_ID: ${PETYR_ACCESS_LAYER_CLIENT_ID:-}
      ACCESS_LAYER_CLIENT_SECRET: ${PETYR_ACCESS_LAYER_CLIENT_SECRET:-}
      PETYR_SESSION_SECRET: ${PETYR_SESSION_SECRET:-}
    depends_on:
      - postgres
    ports:
      - "3001:3000"

  platform-home:
    build:
      context: ./platform-home
      dockerfile: Dockerfile
    container_name: unguess-platform-home
    restart: unless-stopped
    depends_on:
      - forecasting-app
      - redash-ingestor
    ports:
      - "8080:8080"

volumes:
  postgres_data:
